<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Role | SkillBridge</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="./CSS/Choose_Role.CSS">
</head>

<body>

<section class="role-page">
  <div class="container text-center">

    <h1 class="title">اختر نوع حسابك</h1>
    <p class="subtitle">اختر دورك لتبدأ رحلتك مع SkillBridge</p>

    <div class="row justify-content-center g-4 mt-4">

      <!-- Student -->
      <div class="col-lg-5 col-md-6">
        <div class="role-card student-card" onclick="goStudent()">
          <div class="icon">
            <i class="fas fa-user-graduate"></i>
          </div>
          <h3>طالب</h3>
          <p>
            اكتشف مهاراتك، ابنِ Talent DNA الخاص بك،
            واحصل على فرص تدريب تناسبك.
          </p>
          <button class="btn btn-primary">متابعة كطالب</button>
        </div>
      </div>

      <!-- Company -->
      <div class="col-lg-5 col-md-6">
        <div class="role-card company-card" onclick="goCompany()">
          <div class="icon">
            <i class="fas fa-building"></i>
          </div>
          <h3>شركة</h3>
          <p>
            انشر فرص التدريب، حلّل Job DNA،
            واختر أفضل المرشحين بذكاء.
          </p>
          <button class="btn btn-outline-primary">متابعة كشركة</button>
        </div>
      </div>

    </div>

    <div class="back-home mt-5">
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-right"></i> الرجوع إلى الصفحة الرئيسية
      </a>
    </div>

  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your JS -->
<script src="./JS/Choose_Role.JS"></script>

</body>
</html>
