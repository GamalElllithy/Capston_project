<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillBridge | Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="Sign_in.css">
</head>

<body>

<div class="container py-5">

<div class="wizard-box mx-auto fade-in">

<!-- Progress Bar -->
<div class="progress-wrapper mb-4">
  <div class="progress">
    <div id="wizard-progress" class="progress-bar"></div>
  </div>

  <div class="progress-steps">
    <span id="p1" class="p-step active">اختيار الحساب</span>
    <span id="p2" class="p-step">البيانات</span>
    <span id="p3" class="p-step">Talent DNA</span>
    <span id="p4" class="p-step">Passport</span>
    <span id="p5" class="p-step">اللوحة</span>
  </div>
</div>

<h2 class="text-center mb-4 gradient-text">SkillBridge</h2>

<!-- STEP 1: Choose Role -->
<div class="step active" id="choose-type">
  <h4 class="text-center mb-4">اختر نوع الحساب</h4>

  <div class="row g-4">
    <div class="col-md-6">
      <button class="account-btn student" onclick="startFlow('student')">
        <i class="fas fa-user-graduate"></i> طالب
      </button>
    </div>

    <div class="col-md-6">
      <button class="account-btn company" onclick="startFlow('company')">
        <i class="fas fa-building"></i> شركة
      </button>
    </div>
  </div>
</div>

<!-- Student Form -->
<div class="step slide-in" id="student-form">
  <h4>إنشاء حساب طالب</h4>

  <input id="s-name" class="form-control mb-2" placeholder="الاسم الكامل">
  <small class="error d-none" id="e-name"></small>

  <input id="s-email" type="email" class="form-control mb-2" placeholder="البريد الإلكتروني">

  <input id="s-phone" class="form-control mb-2" placeholder="رقم الهاتف">
  <small class="error d-none" id="e-phone"></small>

  <input id="s-pass" type="password" class="form-control mb-3" placeholder="كلمة المرور">
  <small class="error d-none" id="e-pass"></small>

  <button class="btn btn-primary w-100" onclick="validateStudent()">التالي</button>
</div>

<!-- Talent DNA -->
<div class="step slide-in" id="talent-dna">

<h4 class="mb-3">🧬 Talent DNA</h4>

<p class="fw-bold">اختر مهاراتك الأساسية</p>
<div class="skills-grid mb-3">
  <label><input type="checkbox" value="Programming"> برمجة</label>
  <label><input type="checkbox" value="Design"> تصميم</label>
  <label><input type="checkbox" value="Mechatronics"> ميكاترونكس</label>
  <label><input type="checkbox" value="Maintenance"> صيانة</label>
  <label><input type="checkbox" value="Data"> تحليل بيانات</label>
  <label><input type="checkbox" value="AI"> ذكاء اصطناعي</label>
</div>

<p class="fw-bold">اختر 3 اهتمامات فقط</p>
<div class="skills-grid mb-3">
  <label><input type="checkbox" class="career" value="Web Dev"> مطور ويب</label>
  <label><input type="checkbox" class="career" value="Engineer"> مهندس</label>
  <label><input type="checkbox" class="career" value="Designer"> مصمم</label>
  <label><input type="checkbox" class="career" value="Entrepreneur"> رائد أعمال</label>
  <label><input type="checkbox" class="career" value="Technician"> فني</label>
  <label><input type="checkbox" class="career" value="Game Dev"> مبرمج ألعاب</label>
</div>

<p class="fw-bold">مستواك الحالي</p>
<select id="level" class="form-control mb-3">
  <option value="">اختر المستوى</option>
  <option>مبتدئ</option>
  <option>متوسط</option>
  <option>متقدم</option>
</select>

<button class="btn btn-success w-100" onclick="goPassport()">التالي →</button>

</div>

<!-- Passport Step -->
<div class="step slide-in" id="passport">
  <h4>🎫 Skill Passport</h4>
  <p>سننشئ جواز مهاراتك الآن...</p>

  <a href="./Student_Dashboard.html" class="btn btn-dark w-100">
    الانتقال للوحة
  </a>
</div>

<!-- Company Form -->
<div class="step slide-in" id="company-form">
  <h4>إنشاء حساب شركة</h4>

  <input id="c-name" class="form-control mb-2" placeholder="اسم الشركة">
  <input id="c-email" type="email" class="form-control mb-2" placeholder="البريد الرسمي">
  <input id="c-phone" class="form-control mb-2" placeholder="رقم الهاتف">
  <input id="c-pass" type="password" class="form-control mb-3" placeholder="كلمة المرور">

  <button class="btn btn-success w-100" onclick="validateCompany()">إنشاء حساب</button>
</div>

</div>
</div>

<script src="Sign_in.js"></script>
</body>
</html>
